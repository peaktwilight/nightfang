name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish under
        required: true
        default: latest

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish workspace packages
        run: pnpm -r publish --access public --no-git-checks --tag "${{ inputs['dist-tag'] }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
